      status: 200
      actions:
        - resource: session
          parameters:
            id: parsedBody.id
            slug: parsedBody.game_slug

  session:
    - url: /games/{:slug}/sessions/{:id}.json
      status: 200

  pc:
    - url: /games/{:slug}/pcs/{:id}.json
      status: 200
      actions:
        - resource: pc_photos
          parameters:
            slug: parsedBody.game_slug
            id: parsedBody.id
        - resource: short_pc_photos
