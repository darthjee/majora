            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false

  paginated_game_sessions_past:
    - url: /games/{:slug}/sessions/past.json?page={:page}
      status: 200
      actions:
        - resource: session
          parameters:
            id: parsedBody.id
            slug: parsedBody.game_slug

  paginated_game_sessions_future:
