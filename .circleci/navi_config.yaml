      status: 200
      paginated_actions:
        - resource: paginated_pc_documents
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false

  paginated_pc_documents:
    - url: /games/{:slug}/pcs/{:id}/documents.json?page={:page}
      status: 200

  short_pc_documents:
